function generatePriceHistory(base,days=90,vol=0.02){
  const data=[];let price=base*(0.85+Math.random()*0.15);const now=Date.now();
  for(let i=days;i>=0;i--){
    const d=new Date(now-i*86400000);
    price=price*(1+(Math.random()-0.48)*vol);
    data.push({date:d.toLocaleDateString("en-IN",{month:"short",day:"numeric"}),price:parseFloat(price.toFixed(2))});
  }
  return data;
}
function generateMFHistory(nav,days=365,vol=0.012){
  const data=[];let p=nav;const now=Date.now();
  for(let i=days;i>=0;i--){
    const d=new Date(now-i*86400000);
    p=p*(1+(Math.random()-0.46)*vol);
    data.push({date:d.toLocaleDateString("en-IN",{month:"short",day:"numeric"}),price:parseFloat(p.toFixed(2))});
  }
  return data;
}
function getLivePrice(base){return parseFloat((base*(0.92+Math.random()*0.16)).toFixed(2));}
function fmtPrice(v){return v>1000?("₹"+v.toLocaleString("en-IN",{maximumFractionDigits:0})):("₹"+v.toFixed(2));}

function Sparkline({data,color,width=80,height=32}){
  if(!data||data.length<2)return null;
  const prices=data.map(d=>d.price);
  const min=Math.min(...prices),max=Math.max(...prices),range=max-min||1;
  const pts=prices.map((p,i)=>((i/(prices.length-1))*width)+","+(height-((p-min)/range)*height)).join(" ");
  const c=color||(prices[prices.length-1]>=prices[0]?"#6BCB77":"#FF6B6B");
  return React.createElement("svg",{width,height,style:{display:"block"}},
    React.createElement("polyline",{points:pts,fill:"none",stroke:c,strokeWidth:"1.5",strokeLinejoin:"round"})
  );
}

function MultiLineChart({series,height=300,focusedName=null,showActualPrice=false}){
  const [hover,setHover]=useState(null);
  const svgRef=useRef();
  if(!series||series.length===0)return(
    <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#445",fontFamily:"monospace",fontSize:13}}>
      Add a fund or stock above to see chart
    </div>
  );
  const W=700,PAD={l:58,r:20,t:20,b:40};
  const H=height-60;
  const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const normalized=series.map(s=>({...s,data:s.data.map((d,i)=>({...d,pct:showActualPrice?d.price:(i===0?0:parseFloat((((d.price-s.data[0].price)/s.data[0].price)*100).toFixed(2)))}))}));
  const allV=normalized.flatMap(s=>s.data.map(d=>d.pct));
  const minP=Math.min(...allV),maxP=Math.max(...allV),range=maxP-minP||1;
  const labels=normalized[0].data;
  const step=Math.max(1,Math.floor(labels.length/8));
  const toY=v=>PAD.t+ch-((v-minP)/range)*ch;
  const toX=i=>PAD.l+(i/(labels.length-1))*cw;
  const yTicks=5,yStep=range/yTicks;
  const TW=192,TH=24+normalized.length*18+8;

  function handleMouseMove(e){
    const svg=svgRef.current;if(!svg)return;
    const rect=svg.getBoundingClientRect();
    const rawX=(e.clientX-rect.left)/rect.width*W;
    const idx=Math.round(((rawX-PAD.l)/cw)*(labels.length-1));
    if(idx<0||idx>=labels.length){setHover(null);return;}
    setHover({idx,svgX:toX(idx)});
  }

  return(
    <div style={{overflowX:"auto"}}>
      <svg ref={svgRef} viewBox={"0 0 "+W+" "+(H+60)} style={{width:"100%",maxWidth:W,minWidth:300,cursor:"crosshair",display:"block"}}
        onMouseMove={handleMouseMove} onMouseLeave={()=>setHover(null)}>
        {Array.from({length:yTicks+1}).map((_,i)=>{
          const v=minP+i*yStep,y=toY(v);
          return <g key={i}>
            <line x1={PAD.l} x2={W-PAD.r} y1={y} y2={y} stroke="#1e2a3a" strokeWidth="1"/>
            <text x={PAD.l-6} y={y+4} fill="#445" fontSize="9" textAnchor="end">
              {showActualPrice?(v>1000?("₹"+(v/1000).toFixed(1)+"k"):("₹"+v.toFixed(0))):(v.toFixed(1)+"%")}
            </text>
          </g>;
        })}
        {!showActualPrice&&minP<0&&maxP>0&&<line x1={PAD.l} x2={W-PAD.r} y1={toY(0)} y2={toY(0)} stroke="#334" strokeWidth="1.5" strokeDasharray="4,3"/>}
        {labels.filter((_,i)=>i%step===0||i===labels.length-1).map((d,_,arr)=>{
          const idx=labels.indexOf(d);
          return <text key={idx} x={toX(idx)} y={H+14} fill="#445" fontSize="9" textAnchor="middle">{d.date}</text>;
        })}
        {normalized.map(s=>{
          const focused=!focusedName||s.name===focusedName;
          const pts=s.data.map((d,i)=>(toX(i)+","+toY(d.pct))).join(" ");
          return <g key={s.name} opacity={focused?1:0.1}>
            <polyline points={pts} fill="none" stroke={s.color} strokeWidth={s.name===focusedName?3:2} strokeLinejoin="round"/>
            <circle cx={toX(s.data.length-1)} cy={toY(s.data[s.data.length-1].pct)} r="3.5" fill={s.color}/>
          </g>;
        })}
        {hover&&(()=>{
          const tx=hover.svgX+10+TW>W?hover.svgX-TW-10:hover.svgX+10,ty=PAD.t;
          return <g>
            <line x1={hover.svgX} x2={hover.svgX} y1={PAD.t} y2={PAD.t+ch} stroke="#ffffff15" strokeWidth="1" strokeDasharray="3,3"/>
            {normalized.map(s=>{const d=s.data[hover.idx];if(!d)return null;return <circle key={s.name} cx={hover.svgX} cy={toY(d.pct)} r="4" fill={s.color} stroke="#040d18" strokeWidth="1.5"/>;})}
            <rect x={tx} y={ty} width={TW} height={TH} rx="6" fill="#07111e" stroke="#1e3a5f" strokeWidth="1"/>
            <text x={tx+10} y={ty+15} fill="#556" fontSize="9" fontFamily="monospace">{labels[hover.idx]&&labels[hover.idx].date}</text>
            {normalized.map((s,si)=>{
              const d=s.data[hover.idx];if(!d)return null;
              const val=showActualPrice?fmtPrice(d.price):((d.pct>=0?"+":"")+d.pct.toFixed(2)+"%");
              const label=s.name.length>24?s.name.slice(0,22)+"...":s.name;
              return <g key={s.name}>
                <circle cx={tx+10} cy={ty+25+si*18} r="4" fill={s.color}/>
                <text x={tx+20} y={ty+29+si*18} fill="#a0b8d0" fontSize="9" fontFamily="monospace">{label}</text>
                <text x={tx+TW-6} y={ty+29+si*18} fill={s.color} fontSize="9" fontFamily="monospace" textAnchor="end" fontWeight="bold">{val}</text>
              </g>;
            })}
          </g>;
        })()}
      </svg>
    </div>
  );
}

      )}
    </div>
  );
}

function CompareTab(){
  const [items,setItems]=useState([]);
  const [input,setInput]=useState("");
  const [sugg,setSugg]=useState([]);
  const [tf,setTf]=useState("3M");
  const [cat,setCat]=useState("All");
  const [focused,setFocused]=useState(null);
  const [showPrice,setShowPrice]=useState(false);
  const days={"1M":30,"3M":90,"6M":180,"1Y":365,"3Y":1095}[tf];
  const cats=["All","Large Cap","Mid Cap","Small Cap","Flexi Cap","ELSS","Index","Gold","Gold ETF","Silver","Silver ETF","Sectoral-IT","Sectoral-Pharma","Hybrid","Liquid"];

  function getCat(name){const f=MF_CATALOG.find(m=>m.name===name);return f?f.category:"Other";}
  function addItem(name){
    if(!name.trim()||items.find(i=>i.name.toLowerCase()===name.toLowerCase()))return;
    const nav=MF_BASE_NAV[name]||(50+Math.random()*200);
    const isGS=name.includes("Gold")||name.includes("Silver");
    const data=generateMFHistory(nav,days,isGS?0.006:0.012);
    const color=COLORS[items.length%COLORS.length];
    const category=getCat(name);
    const change=parseFloat((((data[data.length-1].price-data[0].price)/data[0].price)*100).toFixed(2));
    setItems(p=>[...p,{name,data,color,category,nav:data[data.length-1].price,change}]);
    setInput("");setSugg([]);
  }
  function removeItem(name){setItems(p=>p.filter(i=>i.name!==name));if(focused===name)setFocused(null);}
  useEffect(()=>{
    setItems(p=>p.map(item=>{
      const nav=MF_BASE_NAV[item.name]||100;
      const isGS=item.name.includes("Gold")||item.name.includes("Silver");
      const data=generateMFHistory(nav,days,isGS?0.006:0.012);
      return{...item,data,nav:data[data.length-1].price,change:parseFloat((((data[data.length-1].price-data[0].price)/data[0].price)*100).toFixed(2))};
    }));
  },[tf]);

  const catItems=cat==="All"?MF_CATALOG.slice(0,16):MF_CATALOG.filter(m=>m.category===cat);
  const chartSeries=items.map(i=>({name:i.name,data:i.data,color:i.color}));

  return(
    <div>
      <h2 style={{color:"#00E5FF",fontFamily:"Syne,sans-serif",marginBottom:4,fontSize:18}}>📊 Compare SIP / MF / Gold / Silver</h2>
      <p style={{color:"#334",fontFamily:"monospace",fontSize:11,marginBottom:12}}>{MF_CATALOG.length}+ funds · Gold · Silver ETFs</p>

      <div style={{position:"relative",marginBottom:10}}>
        <div style={{display:"flex",gap:8}}>
          <input value={input}
            onChange={e=>{setInput(e.target.value);setSugg(e.target.value.length>1?MF_CATALOG.filter(m=>m.name.toLowerCase().includes(e.target.value.toLowerCase())).slice(0,8):[]);}}
            onKeyDown={e=>e.key==="Enter"&&addItem(input)}
            placeholder="Search fund, Gold ETF, Silver ETF..."
            style={{flex:1,background:"#0d1b2a",border:"1px solid #1e3a5f",borderRadius:8,color:"#e0e8f0",padding:"10px 14px",fontFamily:"monospace",fontSize:12,outline:"none"}}/>
          <button onClick={()=>addItem(input)} style={{background:"#00E5FF",color:"#000",border:"none",borderRadius:8,padding:"10px 18px",cursor:"pointer",fontWeight:700,fontSize:13}}>+ Add</button>
        </div>
        {sugg.length>0&&(
          <div style={{position:"absolute",top:"100%",left:0,right:50,background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:8,zIndex:200,overflow:"hidden",marginTop:4}}>
            {sugg.map(s=>(
              <div key={s.name} onClick={()=>addItem(s.name)}
                style={{padding:"9px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #0e2040"}}
                onMouseEnter={e=>e.currentTarget.style.background="#0e2040"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span style={{color:"#a0b8d0",fontSize:12}}>{s.name}</span>
                <span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:(CATEGORY_COLORS[s.category]||"#334")+"22",color:CATEGORY_COLORS[s.category]||"#556",marginLeft:8}}>{s.category}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setCat(c)}
            style={{background:cat===c?(CATEGORY_COLORS[c]||"#00E5FF")+"33":"#07111e",border:"1px solid "+(cat===c?(CATEGORY_COLORS[c]||"#00E5FF"):"#1a2e44"),color:cat===c?(CATEGORY_COLORS[c]||"#00E5FF"):"#445",borderRadius:20,padding:"3px 10px",cursor:"pointer",fontSize:10}}>
            {c}
          </button>
        ))}
      </div>

      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
        {catItems.slice(0,20).map(m=>{
          const already=!!items.find(i=>i.name===m.name);
          return(
            <button key={m.name} onClick={()=>!already&&addItem(m.name)} disabled={already}
              style={{background:already?"#091525":"#07111e",border:"1px solid "+(already?(CATEGORY_COLORS[m.category]||"#00E5FF")+"88":"#1a2e44"),color:already?(CATEGORY_COLORS[m.category]||"#00E5FF"):"#556",borderRadius:6,padding:"5px 10px",cursor:already?"default":"pointer",fontSize:11}}>
              {already?"✓ ":"+ "}{m.name.length>28?m.name.slice(0,26)+"...":m.name}
            </button>
          );
        })}
      </div>

      {items.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10}}>
          {items.map(item=>(
            <div key={item.name} style={{display:"flex",alignItems:"center",gap:6,background:"#0a1628",border:"1px solid "+item.color+"44",borderRadius:20,padding:"5px 12px 5px 10px"}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:item.color,display:"inline-block",flexShrink:0}}/>
              <span style={{color:"#c8d8e8",fontSize:11}}>{item.name}</span>
              <span style={{fontSize:9,padding:"1px 6px",borderRadius:10,background:(CATEGORY_COLORS[item.category]||"#334")+"22",color:CATEGORY_COLORS[item.category]||"#556"}}>{item.category}</span>
              <span style={{color:item.change>=0?"#6BCB77":"#FF6B6B",fontSize:12,marginLeft:2}}>{item.change>=0?"+":""}{item.change}%</span>
              <button onClick={()=>removeItem(item.name)} style={{background:"none",border:"none",color:"#556",cursor:"pointer",fontSize:16,padding:"0 0 0 4px",lineHeight:1}}>×</button>
            </div>
          ))}
          <button onClick={()=>{setItems([]);setFocused(null);}} style={{background:"none",border:"1px solid #1a2e44",color:"#334",borderRadius:20,padding:"5px 12px",cursor:"pointer",fontSize:11}}>Clear All</button>
        </div>
      )}

      {items.length>0&&(
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          {["1M","3M","6M","1Y","3Y"].map(t=>(
            <button key={t} onClick={()=>setTf(t)}
              style={{background:tf===t?"#00E5FF":"#0a1628",color:tf===t?"#000":"#557",border:"1px solid "+(tf===t?"#00E5FF":"#1e3a5f"),borderRadius:6,padding:"4px 12px",cursor:"pointer",fontSize:12,fontWeight:tf===t?700:400}}>
              {t}
            </button>
          ))}
        </div>
      )}

      <div style={{background:"#07111e",borderRadius:12,padding:"14px 8px 8px",border:"1px solid #1a2e44",marginBottom:12}}>
        {items.length>0&&(
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,paddingLeft:8,paddingRight:8}}>
            <span style={{color:"#334",fontSize:11,fontFamily:"monospace"}}>
              {showPrice?"Actual NAV / Price (₹)":"Normalized % Returns"}
              {focused&&<span style={{color:"#00E5FF",marginLeft:8}}>· {focused.length>20?focused.slice(0,18)+"...":focused}</span>}
            </span>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setShowPrice(p=>!p)}
                style={{background:showPrice?"#00E5FF22":"transparent",border:"1px solid "+(showPrice?"#00E5FF":"#1e3a5f"),color:showPrice?"#00E5FF":"#445",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:10}}>
                {showPrice?"₹ Price":"% Return"}
              </button>
              {focused&&<button onClick={()=>setFocused(null)} style={{background:"none",border:"1px solid #1e3a5f",color:"#556",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:10}}>Show All</button>}
            </div>
          </div>
        )}
        <MultiLineChart series={chartSeries} height={300} focusedName={focused} showActualPrice={showPrice}/>
      </div>

      {items.length>0&&(
        <div style={{overflowX:"auto"}}>
          <p style={{color:"#334",fontSize:11,fontFamily:"monospace",marginBottom:8}}>👆 Click any row to focus that fund on chart</p>
          <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"monospace",fontSize:12}}>
            <thead>
              <tr style={{borderBottom:"1px solid #1a2e44"}}>
                {["Fund / Asset","Category","NAV / Price","Return ("+tf+")","Min","Max","Volatility"].map(h=>(
                  <th key={h} style={{padding:"8px 10px",color:"#445",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {items.map(item=>{
                const prices=item.data.map(d=>d.price);
                const minP=Math.min(...prices),maxP=Math.max(...prices);
                const rets=prices.map((p,i)=>i===0?0:(p-prices[i-1])/prices[i-1]);
                const vol=(Math.sqrt(rets.slice(1).reduce((a,r)=>a+r*r,0)/rets.length)*Math.sqrt(252)*100).toFixed(1);
                const cc=CATEGORY_COLORS[item.category]||"#556";
                const isFoc=focused===item.name;
                return(
                  <tr key={item.name}
                    onClick={()=>setFocused(isFoc?null:item.name)}
                    style={{borderBottom:"1px solid #0e1e30",cursor:"pointer",background:isFoc?item.color+"14":"transparent"}}
                    onMouseEnter={e=>{if(!isFoc)e.currentTarget.style.background="#0a1828";}}
                    onMouseLeave={e=>{e.currentTarget.style.background=isFoc?item.color+"14":"transparent";}}>
                    <td style={{padding:"10px 10px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{width:10,height:10,borderRadius:"50%",background:item.color,flexShrink:0,display:"inline-block",boxShadow:isFoc?"0 0 6px "+item.color:"none"}}/>
                        <div>
                          <div style={{color:isFoc?"#fff":"#c8d8e8",fontWeight:isFoc?700:400}}>{item.name}</div>
                          {isFoc&&<div style={{color:"#334",fontSize:9}}>● focused · click to deselect</div>}
                        </div>
                      </div>
                    </td>
                    <td style={{padding:"10px 10px"}}><span style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:cc+"22",color:cc,whiteSpace:"nowrap"}}>{item.category}</span></td>
                    <td style={{padding:"10px 10px",color:"#a0b8d0"}}>{fmtPrice(item.nav)}</td>
                    <td style={{padding:"10px 10px",color:item.change>=0?"#6BCB77":"#FF6B6B",fontWeight:700}}>{item.change>=0?"+":""}{item.change}%</td>
                    <td style={{padding:"10px 10px",color:"#778"}}>{fmtPrice(minP)}</td>
                    <td style={{padding:"10px 10px",color:"#778"}}>{fmtPrice(maxP)}</td>
                    <td style={{padding:"10px 10px",color:"#C77DFF"}}>{vol}%</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function PortfolioTab(){
  const [holdings,setHoldings]=useState(MY_PORTFOLIO.map(h=>({...h,livePrice:getLivePrice(h.avgPrice),history:generatePriceHistory(h.avgPrice)})));
  const [selected,setSelected]=useState([]);
  const [dragOver,setDragOver]=useState(false);
  const [fileMsg,setFileMsg]=useState("");
  const fileRef=useRef();
  useEffect(()=>{
    const id=setInterval(()=>setHoldings(p=>p.map(h=>({...h,livePrice:getLivePrice(h.avgPrice)}))),4000);
    return()=>clearInterval(id);
  },[]);
  const total=holdings.reduce((a,h)=>a+h.livePrice*h.qty,0);
  const invested=holdings.reduce((a,h)=>a+h.avgPrice*h.qty,0);
  const pnl=total-invested;
  function toggleSelect(sym){setSelected(p=>p.includes(sym)?p.filter(s=>s!==sym):[...p,sym]);}
  function removeSelected(){setHoldings(p=>p.filter(h=>!selected.includes(h.symbol)));setSelected([]);}
  function handleFile(f){if(!f)return;setFileMsg("📂 Loaded: "+f.name);setTimeout(()=>setFileMsg(""),5000);}
  const chartSeries=selected.map((sym,si)=>{const h=holdings.find(h=>h.symbol===sym);return h?{name:h.name,data:h.history,color:COLORS[si%COLORS.length]}:null;}).filter(Boolean);
  return(
    <div>
      <h2 style={{color:"#00E5FF",fontFamily:"Syne,sans-serif",marginBottom:4,fontSize:18}}>💼 My Stock Portfolio</h2>
      <p style={{color:"#334",fontFamily:"monospace",fontSize:11,marginBottom:14}}>From TradesAndCharges.xlsx · Prices update every 4s</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:16}}>
        {[{label:"Current Value",val:"₹"+total.toLocaleString("en-IN",{maximumFractionDigits:0}),color:"#00E5FF"},
          {label:"Invested",val:"₹"+invested.toLocaleString("en-IN",{maximumFractionDigits:0}),color:"#a0b8d0"},
          {label:"P&L",val:(pnl>=0?"+":"")+"₹"+Math.abs(pnl).toLocaleString("en-IN",{maximumFractionDigits:0}),color:pnl>=0?"#6BCB77":"#FF6B6B"},
          {label:"Return %",val:(pnl>=0?"+":"")+((pnl/invested)*100).toFixed(2)+"%",color:pnl>=0?"#6BCB77":"#FF6B6B"},
        ].map(c=>(
          <div key={c.label} style={{background:"#07111e",border:"1px solid #1a2e44",borderRadius:10,padding:"12px 14px"}}>
            <div style={{color:"#334",fontSize:10,fontFamily:"monospace",marginBottom:4}}>{c.label}</div>
            <div style={{color:c.color,fontSize:15,fontWeight:700,fontFamily:"monospace"}}>{c.val}</div>
          </div>
        ))}
      </div>
      <div onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0]);}}
        onClick={()=>fileRef.current&&fileRef.current.click()}
        style={{border:"2px dashed "+(dragOver?"#00E5FF":"#1e3a5f"),borderRadius:10,padding:"14px 20px",textAlign:"center",cursor:"pointer",marginBottom:12,background:dragOver?"#071828":"transparent"}}>
        <input ref={fileRef} type="file" accept=".xlsx,.csv" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
        <span style={{color:dragOver?"#00E5FF":"#334",fontFamily:"monospace",fontSize:12}}>📁 Drop TradesAndCharges.xlsx here or click to upload</span>
      </div>
      {fileMsg&&<div style={{color:"#6BCB77",fontFamily:"monospace",fontSize:12,marginBottom:10}}>{fileMsg}</div>}
      {selected.length>0&&(
        <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
          <span style={{color:"#445",fontFamily:"monospace",fontSize:12}}>{selected.length} selected</span>
          <button onClick={removeSelected} style={{background:"#FF6B6B22",border:"1px solid #FF6B6B55",color:"#FF6B6B",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontSize:12}}>🗑 Remove</button>
          <button onClick={()=>setSelected([])} style={{background:"none",border:"1px solid #1e3a5f",color:"#445",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontSize:12}}>Clear</button>
        </div>
      )}
      <div style={{overflowX:"auto",marginBottom:16}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"monospace",fontSize:12}}>
          <thead>
            <tr style={{borderBottom:"1px solid #1a2e44"}}>
              <th style={{width:24}}/>
              {["Stock","Qty","Avg ₹","Live ₹","Value","P&L","7D"].map(h=>(
                <th key={h} style={{padding:"8px 10px",color:"#445",textAlign:"left",fontWeight:600}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {holdings.map(h=>{
              const val=h.livePrice*h.qty;
              const p=(h.livePrice-h.avgPrice)*h.qty;
              const pct=((h.livePrice-h.avgPrice)/h.avgPrice*100).toFixed(2);
              const chk=selected.includes(h.symbol);
              return(
                <tr key={h.symbol} style={{borderBottom:"1px solid #0e1e30",background:chk?"#091525":"transparent"}}>
                  <td style={{padding:"6px 4px"}}><input type="checkbox" checked={chk} onChange={()=>toggleSelect(h.symbol)} style={{accentColor:"#00E5FF",cursor:"pointer"}}/></td>
                  <td style={{padding:"8px 10px"}}>
                    <div style={{color:"#c8d8e8"}}>{h.name}</div>
                    <div style={{color:"#334",fontSize:10}}>{h.symbol}</div>
                  </td>
                  <td style={{padding:"8px 10px",color:"#778"}}>{h.qty}</td>
                  <td style={{padding:"8px 10px",color:"#778"}}>₹{h.avgPrice.toFixed(2)}</td>
                  <td style={{padding:"8px 10px",color:"#00E5FF",fontWeight:700}}>₹{h.livePrice.toFixed(2)}</td>
                  <td style={{padding:"8px 10px",color:"#a0b8d0"}}>₹{val.toLocaleString("en-IN",{maximumFractionDigits:0})}</td>
                  <td style={{padding:"8px 10px",color:p>=0?"#6BCB77":"#FF6B6B",fontWeight:700}}>
                    {p>=0?"+":""}₹{Math.abs(p).toFixed(0)} ({p>=0?"+":""}{pct}%)
                  </td>
                  <td style={{padding:"6px 10px"}}><Sparkline data={h.history.slice(-8)} color={p>=0?"#6BCB77":"#FF6B6B"}/></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {selected.length>0&&(
        <div>
          <h3 style={{color:"#00E5FF",fontFamily:"monospace",fontSize:14,marginBottom:10}}>📈 Compare Selected ({selected.length})</h3>
          <div style={{background:"#07111e",borderRadius:12,padding:"14px 8px 8px",border:"1px solid #1a2e44"}}>
            <MultiLineChart series={chartSeries} height={280} showActualPrice={true}/>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("market");
  const [clock,setClock]=useState("");
  const [open,setOpen]=useState(false);
  useEffect(()=>{
    const tick=()=>{
      const ist=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"}));
      const h=ist.getHours(),m=ist.getMinutes();
      setOpen((h>9||(h===9&&m>=15))&&(h<15||(h===15&&m<=30)));
      setClock(ist.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit"}));
    };
    tick();const id=setInterval(tick,1000);return()=>clearInterval(id);
  },[]);
  const tabs=[{id:"market",label:"🏛 Market"},{id:"compare",label:"📊 Compare SIP/MF"},{id:"portfolio",label:"💼 My Portfolio"}];
  return(
    <div style={{minHeight:"100vh",background:"#040d18",color:"#c8d8e8"}}>
      <div style={{background:"#060f1e",borderBottom:"1px solid #0e2040",padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:22,color:"#00E5FF"}}>₹ BHARAT MARKETS</div>
          <div style={{fontSize:10,color:"#334",marginTop:2}}>NSE · BSE · MF Live Tracker</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{background:open?"#6BCB7722":"#FF6B6B22",border:"1px solid "+(open?"#6BCB77":"#FF6B6B"),color:open?"#6BCB77":"#FF6B6B",borderRadius:20,padding:"3px 10px",fontSize:10,fontFamily:"monospace"}}>
            {open?"● MARKET OPEN":"● MARKET CLOSED"}
          </span>
          <span style={{color:"#00E5FF",fontFamily:"monospace",fontSize:13}}>IST {clock}</span>
        </div>
      </div>
      <div style={{background:"#060f1e",borderBottom:"1px solid #0e2040",display:"flex",padding:"0 16px",overflowX:"auto"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{background:"none",border:"none",borderBottom:"2px solid "+(tab===t.id?"#00E5FF":"transparent"),color:tab===t.id?"#00E5FF":"#334",padding:"12px 16px",cursor:"pointer",fontSize:12,fontWeight:tab===t.id?700:400,whiteSpace:"nowrap"}}>
            {t.label}
          </button>
        ))}
      </div>
      <div style={{padding:"24px 20px",maxWidth:900,margin:"0 auto"}}>
        {tab==="market"&&<MarketTab/>}
        {tab==="compare"&&<CompareTab/>}
        {tab==="portfolio"&&<PortfolioTab/>}
      </div>
      <div style={{borderTop:"1px solid #0e2040",padding:"12px 20px",textAlign:"center",color:"#1e2e40",fontSize:10,fontFamily:"monospace"}}>
        Prices are simulated · Connect NSE/BSE API for live data · Built with your TradesAndCharges.xlsx
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
